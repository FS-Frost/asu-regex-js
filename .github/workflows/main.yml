name: Deploy to GitHub Pages and JSR

on:
    push:
        branches:
            - main

jobs:
    test-build-deploy:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Checkout 🛎️
              uses: actions/checkout@v4

            - uses: oven-sh/setup-bun@v2
              with:
                bun-version: latest

            - name: Install dependencies
              run: |
                  bun install

            - name: Check
              run: |
                  bun run check

            - name: Bundle
              run: |
                  bun run bundle

            - name: Generate docs
              run: |
                  bun run docs

            - name: Deploy
              uses: JamesIves/github-pages-deploy-action@v4
              with:
                  branch: gh-pages
                  folder: examples

    publish:
        runs-on: ubuntu-latest
        needs: test-build-deploy
        permissions:
            contents: read
            id-token: write # The OIDC ID token is used for authentication with JSR.
        steps:
            - name: Checkout 🛎️
              uses: actions/checkout@v4

            - uses: oven-sh/setup-bun@v2
              with:
                bun-version: latest

            - name: Install dependencies
              run: |
                  bun install

            - name: Publish to JSR
              run: |
                  bun run publish
